<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OCI Cost Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e1e8ed; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 400px; padding: 20px; }
        .login-card { background: #192734; border-radius: 16px; padding: 40px 36px; border: 1px solid #253341; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo .icon { width: 64px; height: 64px; background: linear-gradient(135deg, #00b4d8, #0077b6); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; }
        .logo h1 { font-size: 22px; color: #00b4d8; margin-bottom: 4px; }
        .logo p { color: #8899a6; font-size: 13px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #8899a6; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px 16px; background: #253341; border: 1px solid #38444d; border-radius: 8px; color: #e1e8ed; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #00b4d8; }
        .form-group input::placeholder { color: #536a7a; }
        .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #00b4d8, #0077b6); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 8px; }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:active { transform: scale(0.98); }
        .error-msg { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: center; }
        .footer { text-align: center; margin-top: 24px; color: #536a7a; font-size: 12px; }
        .hint { background: #253341; border-radius: 8px; padding: 14px 16px; margin-top: 24px; }
        .hint h4 { color: #8899a6; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .hint table { width: 100%; font-size: 12px; }
        .hint td { padding: 3px 6px; color: #8899a6; }
        .hint td:first-child { color: #00b4d8; font-family: monospace; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="icon">&#9729;</div>
                <h1>OCI Cost Dashboard</h1>
                <p>Sign in to access the dashboard</p>
            </div>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <div class="hint">
                <h4>Demo Credentials</h4>
                <table>
                    <tr><td>admin</td><td>admin123 &mdash; Full access (Start/Stop/Delete)</td></tr>
                    <tr><td>viewer</td><td>viewer123 &mdash; View only</td></tr>
                </table>
            </div>
        </div>
        <div class="footer">OCI Cost Reports Dashboard</div>
    </div>
</body>
</html>
